<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Camera / Lens / Light Catalog</title>
  <style>
    :root {
      --bg: #070914;
      --bg-2: #101527;
      --panel: rgba(255,255,255,0.075);
      --panel-strong: rgba(255,255,255,0.13);
      --line: rgba(255,255,255,0.16);
      --text: #f7f7fb;
      --muted: #aab0c4;
      --accent: #54d4ff;
      --accent-2: #ff5ac8;
      --warm: #ffb45a;
      --green: #7cffb1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #151722;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      cursor: pointer;
    }

    .story {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 9%, rgba(84,212,255,0.34), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255,90,200,0.24), transparent 32%),
        radial-gradient(circle at 58% 94%, rgba(255,180,90,0.22), transparent 30%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 56%, #070914 100%);
      padding: 74px 70px 64px;
    }

    .story::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent 76%);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100%;
      display: none;
    }

    .page.active { display: block; }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 42px;
    }

    .brand {
      letter-spacing: 0.18em;
      font-size: 26px;
      font-weight: 850;
      color: rgba(255,255,255,0.82);
    }

    .pill,
    .back-button,
    .tab-button,
    .transition-back,
    .transition-continue,
    .detail-nav-button {
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.075);
      backdrop-filter: blur(18px);
    }

    .pill,
    .back-button {
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 24px;
      white-space: nowrap;
    }

    .back-button:hover,
    .item-card:hover,
    .tab-button:hover,
    .transition-back:hover,
    .transition-continue:hover,
    .detail-nav-button:hover {
      background: linear-gradient(135deg, rgba(84,212,255,0.18), rgba(255,90,200,0.12));
    }

    .kicker {
      display: inline-flex;
      gap: 12px;
      align-items: center;
      color: var(--accent);
      font-size: 28px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .kicker::before {
      content: "";
      width: 52px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .intro { margin-top: 54px; }

    h1 {
      margin: 0;
      font-size: 104px;
      line-height: 1.08;
      letter-spacing: -0.065em;
      word-break: keep-all;
    }

    .copy {
      margin-top: 28px;
      font-size: 32px;
      line-height: 1.48;
      color: var(--muted);
      word-break: keep-all;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 42px;
    }

    .tab-button {
      min-height: 88px;
      border-radius: 999px;
      font-size: 24px;
      font-weight: 850;
      letter-spacing: -0.035em;
      color: rgba(255,255,255,0.76);
    }

    .tab-button.active {
      color: white;
      border-color: rgba(84,212,255,0.55);
      background: linear-gradient(135deg, rgba(84,212,255,0.24), rgba(255,90,200,0.14));
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 36px;
    }

    .summary-box {
      min-height: 132px;
      padding: 24px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.065);
      backdrop-filter: blur(18px);
    }

    .summary-label {
      font-size: 20px;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .summary-value {
      font-size: 36px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      word-break: keep-all;
    }

    .item-list {
      height: 930px;
      overflow-y: auto;
      padding-right: 8px;
      display: grid;
      align-content: start;
      gap: 18px;
      margin-top: 42px;
    }

    .item-list::-webkit-scrollbar { width: 8px; }
    .item-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 999px; }

    .item-card {
      width: 100%;
      min-height: 270px;
      border-radius: 38px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.075);
      backdrop-filter: blur(18px);
      padding: 28px;
      display: grid;
      grid-template-columns: 122px 1fr 36px;
      gap: 28px;
      align-items: center;
      text-align: left;
      box-shadow: 0 24px 70px rgba(0,0,0,0.20);
    }

    .icon-badge {
      width: 122px;
      height: 122px;
      border-radius: 34px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.22), transparent 24%),
        linear-gradient(145deg, rgba(84,212,255,0.22), rgba(255,90,200,0.12));
      border: 1px solid rgba(255,255,255,0.18);
      position: relative;
      overflow: hidden;
    }

    .icon-badge.camera::before {
      content: "";
      width: 64px;
      height: 44px;
      border-radius: 12px;
      border: 5px solid rgba(255,255,255,0.8);
      position: absolute;
      top: 42px;
      left: 28px;
    }
    .icon-badge.camera::after {
      content: "";
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.88);
      position: absolute;
      top: 52px;
      left: 49px;
      box-shadow: 36px -22px 0 -8px rgba(255,255,255,0.8);
    }

    .icon-badge.lens::before {
      content: "";
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 7px solid rgba(255,255,255,0.86);
      box-shadow: inset 0 0 0 18px rgba(255,255,255,0.08), inset 0 0 0 28px rgba(84,212,255,0.18);
    }

    .icon-badge.light::before {
      content: "";
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 0 38px rgba(255,180,90,0.7), 0 0 80px rgba(84,212,255,0.32);
    }
    .icon-badge.light::after {
      content: "";
      position: absolute;
      width: 72px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.48);
      bottom: 34px;
    }

    .icon-badge.tool::before {
      content: "";
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 20px;
      border: 6px solid rgba(255,255,255,0.84);
      transform: rotate(45deg);
    }

    .icon-badge.tool::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
    }

    .icon-badge.etc::before {
      content: "";
      position: absolute;
      width: 70px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      box-shadow:
        0 -24px 0 rgba(255,255,255,0.72),
        0 24px 0 rgba(255,255,255,0.56);
    }

    .icon-badge.etc::after {
      content: "";
      position: absolute;
      right: 24px;
      top: 26px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(84,212,255,0.95);
      box-shadow:
        0 24px 0 rgba(255,90,200,0.88),
        0 48px 0 rgba(255,180,90,0.82);
    }

    .item-name {
      font-size: 38px;
      font-weight: 920;
      letter-spacing: -0.05em;
      line-height: 1.05;
      word-break: keep-all;
      margin-bottom: 14px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.78);
      font-size: 20px;
      font-weight: 780;
    }

    .summary {
      font-size: 24px;
      line-height: 1.48;
      color: var(--muted);
      word-break: keep-all;
    }

    .item-card > div:nth-child(2) {
      min-height: 198px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .arrow { font-size: 48px; color: rgba(255,255,255,0.48); }

    .detail-hero {
      margin-top: 34px;
      min-height: 375px;
      border-radius: 46px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 16% 20%, rgba(84,212,255,0.26), transparent 30%),
        radial-gradient(circle at 82% 34%, rgba(255,90,200,0.18), transparent 28%),
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.045));
      box-shadow: 0 36px 100px rgba(0,0,0,0.36);
      padding: 46px;
      display: grid;
      align-content: center;
      position: relative;
      overflow: hidden;
    }

    .detail-hero::after {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      right: -70px;
      bottom: -110px;
      border-radius: 50%;
      border: 42px solid rgba(255,255,255,0.055);
    }

    .hero-label {
      color: var(--accent);
      font-size: 26px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .detail-title {
      font-size: 78px;
      line-height: 0.98;
      letter-spacing: -0.065em;
      font-weight: 930;
      max-width: 820px;
      word-break: keep-all;
    }

    .detail-subtitle {
      margin-top: 22px;
      max-width: 780px;
      font-size: 30px;
      line-height: 1.48;
      color: var(--muted);
      word-break: keep-all;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin-top: 38px;
      padding-bottom: 130px;
    }

    .spec-grid, .feature-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .spec-card, .feature-panel {
      border-radius: 30px;
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .spec-card {
      min-height: 158px;
      padding: 26px 26px 22px;
      background: var(--panel);
    }

    .feature-panel {
      min-height: 156px;
      padding: 26px;
      background: var(--panel-strong);
    }

    .spec-label, .feature-title {
      font-size: 22px;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 720;
    }

    .spec-value {
      font-size: 37px;
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: -0.035em;
      word-break: keep-all;
    }

    .feature-text {
      font-size: 30px;
      line-height: 1.25;
      font-weight: 850;
      letter-spacing: -0.035em;
      word-break: keep-all;
    }

    .spec-note {
      margin-top: 8px;
      font-size: 20px;
      color: rgba(255,255,255,0.52);
      line-height: 1.25;
      word-break: keep-all;
    }

    .use-box {
      padding: 28px 32px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(84,212,255,0.18), rgba(255,90,200,0.13));
      border: 1px solid rgba(255,255,255,0.22);
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .use-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: rgba(255,255,255,0.13);
      display: grid;
      place-items: center;
      font-size: 30px;
      flex: 0 0 auto;
    }

    .use-copy strong { display: block; font-size: 27px; margin-bottom: 8px; }
    .use-copy span {
      display: block;
      font-size: 27px;
      line-height: 1.48;
      color: rgba(255,255,255,0.78);
      word-break: keep-all;
    }

    .detail-nav {
      position: absolute;
      left: 70px;
      right: 70px;
      bottom: 54px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      z-index: 3;
    }

    .detail-nav-button {
      min-height: 92px;
      border-radius: 28px;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      text-align: left;
    }

    .detail-nav-button.next { text-align: right; align-items: flex-end; }
    .nav-label { color: rgba(255,255,255,0.52); font-size: 20px; font-weight: 760; }
    .nav-name { color: rgba(255,255,255,0.88); font-size: 25px; font-weight: 860; letter-spacing: -0.035em; line-height: 1.05; max-width: 410px; word-break: keep-all; }

    .transition-layer {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: block;
      overflow-y: auto;
      padding: 160px 90px 110px;
      background:
        radial-gradient(circle at 20% 10%, rgba(84,212,255,0.38), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(255,90,200,0.28), transparent 32%),
        linear-gradient(160deg, rgba(7,9,20,0.98), rgba(16,21,39,0.99));
      opacity: 0;
      pointer-events: none;
      transform: scale(1.015);
      transition: opacity 720ms cubic-bezier(.16,1,.3,1), transform 1200ms cubic-bezier(.16,1,.3,1);
    }

    .transition-layer.active { opacity: 1; transform: scale(1); pointer-events: auto; }
    .transition-layer.leaving { opacity: 0; transform: scale(0.985); transition: opacity 640ms cubic-bezier(.16,1,.3,1), transform 900ms cubic-bezier(.16,1,.3,1); }
    .transition-layer::-webkit-scrollbar { width: 8px; }
    .transition-layer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); border-radius: 999px; }

    .transition-back {
      position: absolute;
      top: 74px;
      left: 70px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      color: rgba(255,255,255,0.84);
      font-size: 24px;
      font-weight: 760;
    }

    .transition-copy {
      width: 100%;
      min-height: 1450px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .transition-label {
      color: var(--accent);
      font-size: 28px;
      font-weight: 850;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(28px);
    }

    .transition-title {
      font-size: 118px;
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 950;
      word-break: keep-all;
      max-width: 860px;
      opacity: 0;
      transform: translateY(36px);
    }

    .transition-sub {
      margin-top: 34px;
      font-size: 36px;
      line-height: 1.48;
      color: var(--muted);
      max-width: 800px;
      word-break: keep-all;
      opacity: 0;
      transform: translateY(32px);
    }

    .transition-continue {
      margin-top: 80px;
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      font-size: 24px;
      font-weight: 760;
      opacity: 0;
      transform: translateY(24px);
    }

    .transition-progress {
      position: absolute;
      left: 90px;
      right: 90px;
      bottom: 78px;
      height: 2px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
      border-radius: 999px;
      opacity: 0;
    }
    .transition-progress::before { content: ""; position: absolute; inset: 0; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

    .transition-ring {
      position: absolute;
      right: -120px;
      bottom: -150px;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      border: 58px solid rgba(255,255,255,0.055);
      opacity: 0;
      transform: scale(0.82) rotate(-18deg);
    }

    .transition-layer.active .transition-label { animation: riseIn 820ms 140ms cubic-bezier(.16,1,.3,1) forwards; }
    .transition-layer.active .transition-title { animation: riseIn 980ms 300ms cubic-bezier(.16,1,.3,1) forwards; }
    .transition-layer.active .transition-sub { animation: riseIn 980ms 560ms cubic-bezier(.16,1,.3,1) forwards; }
    .transition-layer.active .transition-continue { animation: riseIn 780ms 1120ms cubic-bezier(.16,1,.3,1) forwards, gentlePulse 1800ms 1800ms ease-in-out infinite; }
    .transition-layer.active .transition-progress { animation: fadeIn 600ms 820ms ease forwards; }
    .transition-layer.active .transition-progress::before { animation: progressGrow 1500ms 600ms cubic-bezier(.16,1,.3,1) forwards; }
    .transition-layer.active .transition-ring { animation: ringIn 1200ms 220ms cubic-bezier(.16,1,.3,1) forwards; }

    .transition-layer.style-medium-format { background: radial-gradient(circle at 16% 10%, rgba(255,180,90,0.30), transparent 30%), radial-gradient(circle at 78% 22%, rgba(84,212,255,0.24), transparent 32%), linear-gradient(155deg, rgba(8,7,10,0.98), rgba(30,22,17,0.99)); }
    .style-medium-format .transition-title { font-family: Georgia, "Times New Roman", serif; font-weight: 650; letter-spacing: -0.055em; }
    .style-medium-format .transition-label { color: var(--warm); }
    .style-medium-format .transition-ring { border-radius: 42px; transform: scale(0.84) rotate(8deg); }

    .transition-layer.style-resolution { background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px), radial-gradient(circle at 78% 18%, rgba(84,212,255,0.30), transparent 32%), linear-gradient(160deg, rgba(5,8,18,0.99), rgba(11,22,38,0.99)); background-size: 42px 42px, 42px 42px, auto, auto; }
    .style-resolution .transition-title { letter-spacing: -0.09em; }
    .style-resolution .transition-label { color: #7fdcff; }

    .transition-layer.style-compact { background: radial-gradient(circle at 85% 12%, rgba(124,255,177,0.24), transparent 28%), radial-gradient(circle at 18% 80%, rgba(84,212,255,0.24), transparent 28%), linear-gradient(160deg, rgba(5,14,18,0.99), rgba(8,18,26,0.99)); }
    .style-compact .transition-title { font-size: 104px; letter-spacing: -0.07em; max-width: 780px; }
    .style-compact .transition-label { color: var(--green); }

    .transition-layer.style-film { background: repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 18px), radial-gradient(circle at 24% 16%, rgba(255,180,90,0.28), transparent 30%), linear-gradient(160deg, rgba(18,12,8,0.99), rgba(22,14,22,0.99)); }
    .style-film .transition-title { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-weight: 650; }
    .style-film .transition-label { color: #ffd18a; }

    .transition-layer.style-cinema { background: linear-gradient(to bottom, rgba(0,0,0,0.38) 0 10%, transparent 10% 90%, rgba(0,0,0,0.38) 90% 100%), radial-gradient(circle at 72% 20%, rgba(255,90,90,0.20), transparent 30%), linear-gradient(160deg, rgba(4,5,8,0.99), rgba(15,10,18,0.99)); }
    .style-cinema .transition-title { letter-spacing: -0.06em; text-transform: uppercase; }
    .style-cinema .transition-label { color: #ff7b7b; }
    .style-cinema .transition-ring { width: 700px; height: 260px; border-radius: 46px; right: -180px; bottom: 50px; }

    .transition-layer.style-classic { background: radial-gradient(circle at 24% 18%, rgba(255,255,255,0.18), transparent 28%), linear-gradient(160deg, rgba(14,13,12,0.99), rgba(32,28,24,0.99)); }
    .style-classic .transition-title { font-family: Georgia, "Times New Roman", serif; font-weight: 620; letter-spacing: -0.045em; }
    .style-classic .transition-label { color: #e8d6bd; }

    .transition-layer.style-ccd { background: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 6px), radial-gradient(circle at 30% 16%, rgba(255,90,200,0.28), transparent 30%), linear-gradient(160deg, rgba(10,8,18,0.99), rgba(26,10,30,0.99)); }
    .style-ccd .transition-title { font-size: 108px; letter-spacing: -0.04em; }
    .style-ccd .transition-label { color: #ff8fe1; }

    .transition-layer.style-instax { background: radial-gradient(circle at 20% 12%, rgba(255,255,255,0.22), transparent 26%), radial-gradient(circle at 82% 18%, rgba(124,255,177,0.26), transparent 30%), linear-gradient(160deg, rgba(8,18,17,0.99), rgba(10,20,26,0.99)); }
    .style-instax .transition-title { font-size: 110px; letter-spacing: -0.06em; }
    .style-instax .transition-label { color: #9dffd0; }

      ]
    };

    const listPage = document.getElementById("listPage");
    const detailPage = document.getElementById("detailPage");
    const itemList = document.getElementById("itemList");
    const topPill = document.getElementById("topPill");
    const listKicker = document.getElementById("listKicker");
    const listTitle = document.getElementById("listTitle");
    const listCopy = document.getElementById("listCopy");
    const countValue = document.getElementById("countValue");
    const systemValue = document.getElementById("systemValue");
    const useValue = document.getElementById("useValue");
    const backButton = document.getElementById("backButton");
    const detailPill = document.getElementById("detailPill");
    const detailEyebrow = document.getElementById("detailEyebrow");
    const detailTitle = document.getElementById("detailTitle");
    const detailSubtitle = document.getElementById("detailSubtitle");
    const specGrid = document.getElementById("specGrid");
    const featureRow = document.getElementById("featureRow");
    const detailUse = document.getElementById("detailUse");
    const prevItem = document.getElementById("prevItem");
    const nextItem = document.getElementById("nextItem");
    const prevItemName = document.getElementById("prevItemName");
    const nextItemName = document.getElementById("nextItemName");
    const transitionLayer = document.getElementById("transitionLayer");
    const transitionLabel = document.getElementById("transitionLabel");
    const transitionTitle = document.getElementById("transitionTitle");
    const transitionSub = document.getElementById("transitionSub");
    const transitionContinue = document.getElementById("transitionContinue");
    const transitionBack = document.getElementById("transitionBack");

    let currentCategory = "camera";
    let currentIndex = 0;
    let pendingDetailId = null;
    let transitionReady = false;

    function activeItems() { return data[currentCategory]; }

    function show(page) {
      listPage.classList.toggle("active", page === "list");
      detailPage.classList.toggle("active", page === "detail");
      window.scrollTo(0, 0);
    }

    function renderList(category = currentCategory) {
      currentCategory = category;
      const info = categoryInfo[category];
      const items = activeItems();

      document.querySelectorAll(".tab-button").forEach(btn => btn.classList.toggle("active", btn.dataset.category === category));
      topPill.textContent = info.title.toUpperCase();
      listKicker.textContent = info.kicker;
      listTitle.innerHTML = info.headline;
      listCopy.textContent = info.copy;
      countValue.textContent = items.length;
      systemValue.textContent = info.system;
      useValue.textContent = info.use;
      backButton.textContent = `‹ ${info.title} 목록`;
      transitionBack.textContent = `‹ ${info.title} 목록`;

      itemList.innerHTML = items.map((item, index) => `
        <button class="item-card" data-id="${item.id}">
          <div class="icon-badge ${info.icon}" aria-hidden="true"></div>
          <div>
            <div class="item-name">${String(index + 1).padStart(2, "0")} · ${item.name}${item.qty ? ` <span style="font-size:.7em;color:rgba(255,255,255,.58);">${item.qty}</span>` : ""}</div>
            <div class="meta">${item.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</div>
            <div class="summary">${item.summary}</div>
          </div>
          <div class="arrow">›</div>
        </button>
      `).join("");

      document.querySelectorAll("[data-id]").forEach(button => button.addEventListener("click", () => playTransition(button.dataset.id)));
      show("list");
    }

    function playTransition(id) {
      const item = activeItems().find(entry => entry.id === id);
      const copy = item.transition || ["EQUIPMENT", item.name, item.summary];
      pendingDetailId = id;
      transitionReady = false;
      transitionLabel.textContent = copy[0];
      transitionTitle.textContent = copy[1];
      transitionSub.textContent = copy[2];
      transitionLayer.className = "transition-layer";
      transitionLayer.classList.add(item.style || "style-resolution");
      transitionLayer.classList.add("active");
      transitionLayer.scrollTop = 0;
      window.setTimeout(() => { transitionReady = true; }, 1500);
    }

    function finishTransition() {
      if (!pendingDetailId || !transitionLayer.classList.contains("active") || !transitionReady) return;
      transitionLayer.classList.add("leaving");
      window.setTimeout(() => renderDetail(pendingDetailId), 360);
      window.setTimeout(() => {
        transitionLayer.classList.remove("active", "leaving");
        pendingDetailId = null;
        transitionReady = false;
      }, 760);
    }

    function cancelTransition() {
      if (!transitionLayer.classList.contains("active")) return;
      transitionLayer.classList.add("leaving");
      window.setTimeout(() => {
        transitionLayer.classList.remove("active", "leaving");
        pendingDetailId = null;
        transitionReady = false;
        show("list");
      }, 520);
    }

    function renderDetail(id) {
      const items = activeItems();
      const item = items.find(entry => entry.id === id);
      currentIndex = items.findIndex(entry => entry.id === id);
      const info = categoryInfo[currentCategory];

      detailPill.textContent = item.pill;
      detailEyebrow.textContent = item.eyebrow;
      detailTitle.textContent = item.name;
      detailSubtitle.textContent = item.subtitle;
      detailUse.textContent = item.use;

      specGrid.innerHTML = item.specs.map(spec => `
        <article class="spec-card"><div class="spec-label">${spec[0]}</div><div class="spec-value">${spec[1]}</div><div class="spec-note">${spec[2]}</div></article>
      `).join("");

      featureRow.innerHTML = item.features.map(feature => `
        <article class="feature-panel"><div class="feature-title">${feature[0]}</div><div class="feature-text">${feature[1]}</div></article>
      `).join("");

      const prevIndex = (currentIndex - 1 + items.length) % items.length;
      const nextIndex = (currentIndex + 1) % items.length;
      prevItemName.textContent = items[prevIndex].name;
      nextItemName.textContent = items[nextIndex].name;
      prevItem.onclick = () => playTransition(items[prevIndex].id);
      nextItem.onclick = () => playTransition(items[nextIndex].id);
      backButton.textContent = `‹ ${info.title} 목록`;
      show("detail");
    }

    document.querySelectorAll(".tab-button").forEach(button => button.addEventListener("click", () => renderList(button.dataset.category)));
    backButton.addEventListener("click", () => renderList(currentCategory));
    transitionContinue.addEventListener("click", finishTransition);
    transitionBack.addEventListener("click", cancelTransition);
    document.addEventListener("keydown", (event) => {
      if (!transitionLayer.classList.contains("active")) return;
      if (["Enter", " "].includes(event.key)) {
        event.preventDefault();
        finishTransition();
      }
    });

    function fitStoryToViewport() {
      const widthScale = window.innerWidth / 1080;
      const heightScale = window.innerHeight / 1920;
      const scale = Math.min(widthScale, heightScale);
      document.documentElement.style.setProperty("--app-scale", scale);
    }

    window.addEventListener("resize", fitStoryToViewport);
    window.addEventListener("orientationchange", fitStoryToViewport);
    fitStoryToViewport();

    renderList("camera");
  </script>
</body>
</html>
